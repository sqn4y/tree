<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Причины конфликта</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: url('tree.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Arial', 'Segoe UI', sans-serif;
        }

        .circle {
            position: absolute;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            color: #333;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: none;
            box-shadow:
                0 4px 15px rgba(0,0,0,0.35),
                0 0 0 3px rgba(255,255,255,0.6),
                inset 0 0 20px rgba(0,0,0,0.05);
            padding: 20px;
            line-height: 1.35;
            z-index: 10;
            transition: box-shadow 0.15s ease;
        }

        .circle:active,
        .circle.dragging {
            cursor: grabbing;
            box-shadow:
                0 8px 30px rgba(0,0,0,0.45),
                0 0 0 3px rgba(255,255,255,0.8),
                inset 0 0 20px rgba(0,0,0,0.05);
        }

        #circle1 { left: 10%; top: 15%; }
        #circle2 { left: 72%; top: 15%; }
        #circle3 { left: 40%; top: 8%; }
        #circle4 { left: 8%; top: 65%; }
        #circle5 { left: 70%; top: 65%; }
    </style>
</head>
<body>

    <div class="circle" id="circle1">Исторические<br>обиды</div>
    <div class="circle" id="circle2">Борьба за<br>ресурсы</div>
    <div class="circle" id="circle3">Культурные<br>различия</div>
    <div class="circle" id="circle4">Бытовые<br>предрассудки</div>
    <div class="circle" id="circle5">Провокация и<br>экстремизм</div>

    <script>
        (function () {
            const circles = document.querySelectorAll('.circle');
            let dragEl = null;
            let offsetX = 0;
            let offsetY = 0;

            function onDown(e) {
                dragEl = e.currentTarget;
                dragEl.classList.add('dragging');

                const point = e.touches ? e.touches[0] : e;
                const rect = dragEl.getBoundingClientRect();

                offsetX = point.clientX - rect.left;
                offsetY = point.clientY - rect.top;

                e.preventDefault();
            }

            function onMove(e) {
                if (!dragEl) return;
                e.preventDefault();

                const point = e.touches ? e.touches[0] : e;

                let x = point.clientX - offsetX;
                let y = point.clientY - offsetY;

                // Не даём утащить за экран
                const maxX = window.innerWidth - dragEl.offsetWidth;
                const maxY = window.innerHeight - dragEl.offsetHeight;
                x = Math.max(0, Math.min(x, maxX));
                y = Math.max(0, Math.min(y, maxY));

                dragEl.style.left = x + 'px';
                dragEl.style.top = y + 'px';
            }

            function onUp() {
                if (dragEl) {
                    dragEl.classList.remove('dragging');
                    dragEl = null;
                }
            }

            circles.forEach(function (circle) {
                // Мышь
                circle.addEventListener('mousedown', onDown);
                // Тач
                circle.addEventListener('touchstart', onDown, { passive: false });
            });

            document.addEventListener('mousemove', onMove);
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('mouseup', onUp);
            document.addEventListener('touchend', onUp);
        })();
    </script>

</body>
</html>
